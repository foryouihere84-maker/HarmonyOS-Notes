<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            padding: 16px;
            background-color: #ffffff;
            color: #333333;
        }
        
        body.dark {
            background-color: #1e1e1e;
            color: #e0e0e0;
        }
        
        .markdown-body {
            max-width: 100%;
            overflow-x: auto;
        }
        
        .markdown-body h1 {
            font-size: 2em;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 16px;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
        }
        
        .markdown-body.dark h1 {
            border-bottom-color: #30363d;
        }
        
        .markdown-body h2 {
            font-size: 1.5em;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 16px;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
        }
        
        .markdown-body.dark h2 {
            border-bottom-color: #30363d;
        }
        
        .markdown-body h3 {
            font-size: 1.25em;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 16px;
        }
        
        .markdown-body h4 {
            font-size: 1em;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 16px;
        }
        
        .markdown-body h5 {
            font-size: 0.875em;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 16px;
        }
        
        .markdown-body h6 {
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 16px;
            color: #6a737d;
        }
        
        .markdown-body p {
            margin-top: 0;
            margin-bottom: 16px;
        }
        
        .markdown-body ul, .markdown-body ol {
            margin-top: 0;
            margin-bottom: 16px;
            padding-left: 2em;
        }
        
        .markdown-body li {
            margin-top: 0.25em;
        }
        
        .markdown-body code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(27,31,35,0.05);
            border-radius: 3px;
        }
        
        .markdown-body pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
        }
        
        .markdown-body blockquote {
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #d0d7de;
            margin-bottom: 16px;
        }
        
        .markdown-body table {
            border-spacing: 0;
            border-collapse: collapse;
            margin-bottom: 16px;
            width: 100%;
        }
        
        .markdown-body table th, .markdown-body table td {
            padding: 6px 13px;
            border: 1px solid #d0d7de;
        }
        
        .markdown-body table th {
            font-weight: 600;
            background-color: #f6f8fa;
        }
        
        .markdown-body table tr {
            background-color: #ffffff;
            border-top: 1px solid #d0d7de;
        }
        
        .markdown-body table tr:nth-child(2n) {
            background-color: #f6f8fa;
        }
        
        .markdown-body img {
            max-width: 100%;
            box-sizing: content-box;
            background-color: #ffffff;
        }
        
        .markdown-body a {
            color: #0969da;
            text-decoration: none;
        }
        
        .markdown-body a:hover {
            text-decoration: underline;
        }
        
        .markdown-body hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: #d0d7de;
            border: 0;
        }
        
        .dark .markdown-body code {
            background-color: rgba(110,118,129,0.4);
        }
        
        .dark .markdown-body pre {
            background-color: #161b22;
        }
        
        .dark .markdown-body blockquote {
            color: #8b949e;
            border-left-color: #30363d;
        }
        
        .dark .markdown-body table th, .dark .markdown-body table td {
            border-color: #30363d;
        }
        
        .dark .markdown-body table th {
            background-color: #161b22;
        }
        
        .dark .markdown-body table tr {
            background-color: #0d1117;
            border-top-color: #30363d;
        }
        
        .dark .markdown-body table tr:nth-child(2n) {
            background-color: #161b22;
        }
        
        .dark .markdown-body hr {
            background-color: #30363d;
        }
        
        .dark .markdown-body a {
            color: #58a6ff;
        }
        
        .hljs {
            background: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
        }
        
        .dark .hljs {
            background: #161b22;
        }
    </style>
</head>
<body>
    <div id="content" class="markdown-body"></div>
    
    <script src="marked.min.js"></script>
    <script>
        console.log('HTML: marked loaded:', typeof marked !== 'undefined');
    </script>
    <script src="highlight.min.js"></script>
    <script>
        console.log('HTML: hljs loaded:', typeof hljs !== 'undefined');
    </script>
    
    <script>
        window.addEventListener('load', function() {
            console.log('HTML: Page loaded');
            console.log('HTML: marked available:', typeof marked !== 'undefined');
            console.log('HTML: hljs available:', typeof hljs !== 'undefined');
            
            if (typeof marked !== 'undefined') {
                console.log('HTML: Initializing marked');
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    tables: true,
                    sanitize: false,
                    highlight: function(code, lang) {
                        if (lang && hljs.getLanguage(lang)) {
                            try {
                                return hljs.highlight(code, { language: lang }).value;
                            } catch (err) {}
                        }
                        return hljs.highlightAuto(code).value;
                    }
                });
                
                function updateMarkdown(markdown, isDark) {
                    console.log('HTML: updateMarkdown called, markdown length:', markdown ? markdown.length : 0, 'isDark:', isDark);
                    const content = document.getElementById('content');
                    const body = document.body;
                    
                    if (isDark) {
                        body.classList.add('dark');
                    } else {
                        body.classList.remove('dark');
                    }
                    
                    content.innerHTML = marked.parse(markdown || '');
                    console.log('HTML: Markdown rendered');
                }
                
                window.updateMarkdown = updateMarkdown;
                console.log('HTML: updateMarkdown function exposed');
                
                window.addEventListener('message', function(event) {
                    const data = event.data;
                    console.log('HTML: Received message:', data);
                    if (data.action === 'update') {
                        updateMarkdown(data.markdown, data.isDark);
                    }
                });
                
                console.log('HTML: Initialization complete');
            } else {
                console.error('ERROR: marked.js not loaded');
            }
        });
    </script>
</body>
</html>
