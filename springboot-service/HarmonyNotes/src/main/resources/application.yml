spring:
  application:
    name: harmonynotes
  datasource:
    url: jdbc:mysql://localhost:3306/harmonynotes
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.harmonynotes.harmonynotes.entity

jwt:
  secret: harmonynotes-secret-key-2024-very-long-key-for-jwt-token-generation-must-be-at-least-256-bits-long
  expiration: 604800000

ai:
  api:
    url: https://api.deepseek.com/chat/completions
    key: sk-32361de2e77b4c48b3b184a6fb712664
    model: deepseek-reasoner

onedrive:
  client-id: e2c2ad83-515d-4a96-bd09-fc0d73ece400
  authority: https://login.microsoft.com/consumers
  redirect-uri: harmonynote://oauth/callback
  scopes: Files.ReadWrite User.Read offline_access
  graph-api-url: https://graph.microsoft.com/v1.0
  base:
    path: /iherefor_Notebook
  request-timeout-ms: 30000
  max-retry-count: 3
  retry-delay-ms: 1000

server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    connection-timeout: 300000
    threads:
      max: 200
      min-spare: 10
  mvc:
    async:
      request-timeout: 300000
